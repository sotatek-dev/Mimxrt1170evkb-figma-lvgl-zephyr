# App config. Change values here, or run `west build -t menuconfig`
# after configuring the build directory.

CONFIG_DISPLAY=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Generated UI screens use more stack and LVGL heap than the basic app.
CONFIG_MAIN_STACK_SIZE=131072

CONFIG_LVGL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_LOG_LEVEL_ERROR=y
CONFIG_LV_Z_MEM_POOL_SIZE=262144
CONFIG_LV_USE_OBJ_NAME=y

# The RK055HDMIPI4MA0 panel is physically 720x1280. The UI is authored as
# 1280x720, so LVGL renders landscape and eLCDIF/PXP rotates the frame to
# the panel. PXP rotation is counter-clockwise; LVGL rotation 90 maps to
# eLCDIF PXP rotate 270.
CONFIG_DMA=y
CONFIG_MCUX_PXP=y
CONFIG_MCUX_ELCDIF_PXP=y
CONFIG_MCUX_ELCDIF_PXP_ROTATE_270=y
CONFIG_LV_Z_FULL_REFRESH=y

CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_CALENDAR=y
CONFIG_LV_USE_CALENDAR_HEADER_ARROW=y
CONFIG_LV_USE_CHART=y
CONFIG_LV_USE_CHECKBOX=y
CONFIG_LV_USE_DROPDOWN=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_KEYBOARD=y
CONFIG_LV_USE_SCALE=y
CONFIG_LV_USE_SLIDER=y
CONFIG_LV_USE_SWITCH=y
CONFIG_LV_USE_TABVIEW=y
CONFIG_LV_USE_TEXTAREA=y

CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_46=y
